name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/global.json

      - name: Generate build assets
        shell: pwsh
        run: ./scripts/generate-build-assets.ps1 -Configuration Release

      - name: Restore
        run: dotnet restore SimpleAudioRouter.sln

      - name: Build
        run: dotnet build SimpleAudioRouter.sln -c Release --no-restore

      - name: Cache Inno Setup
        if: github.event_name == 'push'
        uses: actions/cache@v4
        id: innosetup-cache
        with:
          path: |
            C:\Program Files (x86)\Inno Setup 6
            C:\Program Files\Inno Setup 6
          key: innosetup-6-${{ runner.os }}
          restore-keys: innosetup-6-${{ runner.os }}

      - name: Install Inno Setup
        if: github.event_name == 'push' && steps.innosetup-cache.outputs.cache-hit != 'true'
        run: choco install innosetup -y --no-progress

      - name: Read version
        if: github.event_name == 'push'
        id: version
        shell: pwsh
        run: |
          if ('${{ github.ref_type }}' -eq 'tag') {
            $version = '${{ github.ref_name }}' -replace '^v', ''
          } else {
            [xml]$project = Get-Content src/SimpleAudioRouter/SimpleAudioRouter.csproj
            $version = ($project.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1).Version
          }
          if (-not $version) { throw "Version not found" }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build installer
        if: github.event_name == 'push'
        shell: pwsh
        run: ./installer/build-installer.ps1

      - name: Upload installer artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: dist/SimpleAudioRouter-Setup-*.exe
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: installer
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true
