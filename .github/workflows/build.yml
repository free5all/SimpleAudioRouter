name: Build and Release

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore SimpleAudioRouter.sln

      - name: Build
        run: dotnet build SimpleAudioRouter.sln -c Release --no-restore

  release:
    runs-on: windows-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Read version
        id: version
        shell: pwsh
        run: |
          [xml]$project = Get-Content src/SimpleAudioRouter/SimpleAudioRouter.csproj
          $version = ($project.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1).Version
          if (-not $version) { throw "Version not found in csproj" }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build installer
        shell: pwsh
        run: ./installer/build-installer.ps1

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: dist/SimpleAudioRouter-Setup-*.exe
          fail_on_unmatched_files: true
