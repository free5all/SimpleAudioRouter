name: Build

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Generate build assets
        shell: pwsh
        run: ./scripts/generate-build-assets.ps1 -Configuration Release

      - name: Restore
        run: dotnet restore SimpleAudioRouter.sln

      - name: Build
        run: dotnet build SimpleAudioRouter.sln -c Release --no-restore

      - name: Install Inno Setup
        if: github.event_name == 'push'
        run: choco install innosetup -y --no-progress

      - name: Read version
        if: github.event_name == 'push'
        id: version
        shell: pwsh
        run: |
          [xml]$project = Get-Content src/SimpleAudioRouter/SimpleAudioRouter.csproj
          $version = ($project.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1).Version
          if (-not $version) { throw "Version not found in csproj" }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build installer
        if: github.event_name == 'push'
        shell: pwsh
        run: ./installer/build-installer.ps1

      - name: Upload installer artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: SimpleAudioRouter-Setup-v${{ steps.version.outputs.version }}
          path: dist/SimpleAudioRouter-Setup-*.exe
          if-no-files-found: error
